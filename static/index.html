<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>医生小红书图文笔记生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f8f9fa;color:#1a1a2e;line-height:1.6}
.page{max-width:640px;margin:0 auto;padding:20px}
h1{font-size:24px;font-weight:800;text-align:center;margin:20px 0 8px;color:#1e293b}
.subtitle{text-align:center;color:#64748b;font-size:14px;margin-bottom:28px}
.form-card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:20px}
.form-card h3{font-size:16px;font-weight:700;margin-bottom:14px;color:#1e293b;padding-bottom:8px;border-bottom:1px solid #f1f5f9}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:4px}
.form-group input,.form-group textarea{width:100%;padding:10px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;font-family:inherit}
.form-group input:focus,.form-group textarea:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
textarea{min-height:80px;resize:vertical}
.row{display:flex;gap:12px}
.row .form-group{flex:1}
.photo-upload{display:flex;align-items:center;gap:14px}
.photo-preview{width:64px;height:64px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden;border:2px dashed #d1d5db;flex-shrink:0}
.photo-preview img{width:100%;height:100%;object-fit:cover}
.upload-btn{padding:8px 16px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#475569;font-size:13px;cursor:pointer}
.upload-btn:hover{border-color:#3b82f6;color:#3b82f6}
.btn{padding:14px 28px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;border:none;width:100%;transition:all 0.2s}
.btn-primary{background:#1e293b;color:#fff}
.btn-primary:hover{background:#0f172a}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.progress-box{text-align:center;padding:40px;background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.spinner{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.result-box{background:#fff;border-radius:12px;padding:24px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.result-link a{color:#1d4ed8;font-size:15px;font-weight:600;text-decoration:none}
.result-link a:hover{text-decoration:underline}
.btn-outline{background:#fff;border:1px solid #d1d5db;color:#1e293b;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;width:auto}
.btn-outline:hover{border-color:#1e293b}
.tip{font-size:12px;color:#94a3b8;margin-top:4px}
</style>
</head>
<body>
<div class="page">
<h1>📝 医生小红书图文生成器</h1>
<div class="subtitle">输入主题，一键生成专业科普海报</div>

<div class="form-card">
  <h3>👨‍⚕️ 医生信息（保存后下次自动填充）</h3>
  <div class="form-group">
    <label>照片</label>
    <div class="photo-upload">
      <div class="photo-preview" id="photoPreview">👤</div>
      <div>
        <button class="upload-btn" onclick="document.getElementById('photoFile').click()">上传照片</button>
        <input type="file" id="photoFile" accept="image/*" style="display:none" onchange="uploadPhoto(this)">
        <div class="tip">建议正装半身照，白底最佳</div>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="form-group">
      <label>姓名</label>
      <input type="text" id="doctorName" placeholder="如：张医生">
    </div>
    <div class="form-group">
      <label>小红书号</label>
      <input type="text" id="xhsId" placeholder="如：231926288">
    </div>
  </div>
  <div class="row">
    <div class="form-group">
      <label>医院</label>
      <input type="text" id="hospital" placeholder="如：深圳市南山区人民医院">
    </div>
    <div class="form-group">
      <label>科室</label>
      <input type="text" id="department" placeholder="如：整形美容烧伤科">
    </div>
  </div>
</div>

<div class="form-card">
  <h3>📝 笔记内容</h3>
  <div class="form-group">
    <label>主题 *</label>
    <input type="text" id="topic" placeholder="如：双眼皮术后护理注意事项">
  </div>
  <div class="form-group">
    <label>额外要求（可选）</label>
    <textarea id="extra" placeholder="如：重点讲冷热敷和饮食，语气亲切一些..."></textarea>
  </div>
  <button class="btn btn-primary" id="genBtn" onclick="startGenerate()">🚀 一键生成图文笔记</button>
</div>

<div id="resultArea"></div>
</div>
<script src="app.js"></script>
</body>
</html>
